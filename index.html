```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aroga Foods</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}

.header{
    position:sticky;
    top:0;
    background:#2E7D32;
    padding:12px;
    text-align:center;
    z-index:1000;
}

.btn{
    display:inline-block;
    background:#fff;
    color:#2E7D32;
    text-decoration:none;
    padding:10px 18px;
    margin:5px;
    border-radius:25px;
    font-weight:bold;
}

#viewer{
    max-width:900px;
    margin:20px auto;
}

canvas{
    display:block;
    width:100%;
    height:auto;
    margin:20px auto;
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}
</style>
</head>

<body>

<div class="header">
<a class="btn" href="https://www.arogafoods.co.in/" target="_blank">
🌐 Our Website
</a>

<a class="btn" href="https://www.google.com/search?q=Aroga+Foods" target="_blank">
⭐ Google Review
</a>
</div>

<div id="viewer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* Change this only if your PDF filename is different */
const pdfFile = "Groundnut oil .pdf";

pdfjsLib.getDocument(pdfFile).promise.then(function(pdf){

    const viewer=document.getElementById("viewer");

    for(let pageNumber=1;pageNumber<=pdf.numPages;pageNumber++){

        pdf.getPage(pageNumber).then(function(page){

            const scale=1.8;
            const viewport=page.getViewport({scale:scale});

            const canvas=document.createElement("canvas");
            const context=canvas.getContext("2d");

            canvas.width=viewport.width;
            canvas.height=viewport.height;

            viewer.appendChild(canvas);

            page.render({
                canvasContext:context,
                viewport:viewport
            });

        });

    }

}).catch(function(error){

document.getElementById("viewer").innerHTML=
"<h2 style='text-align:center;color:red;'>PDF not found.<br>Please check the PDF filename.</h2>";

console.log(error);

});

</script>

</body>
</html>
```
