<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aroga Foods PDF Viewer</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f3f3;
}

.header{
    position:sticky;
    top:0;
    background:#2E7D32;
    padding:10px;
    text-align:center;
}

.header a{
    display:inline-block;
    text-decoration:none;
    background:#fff;
    color:#2E7D32;
    padding:10px 18px;
    margin:5px;
    border-radius:25px;
    font-weight:bold;
}

#pageInfo{
    text-align:center;
    font-size:18px;
    margin:10px;
}

canvas{
    display:block;
    margin:0 auto;
    max-width:95%;
    height:auto;
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.controls{
    text-align:center;
    margin:20px;
}

button{
    padding:10px 20px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<a href="https://www.arogafoods.co.in/" target="_blank">
🌐 Our Website
</a>

<a href="https://www.google.com/search?q=Aroga+Foods" target="_blank">
⭐ Google Review
</a>
</div>

<div id="pageInfo">Loading...</div>

<canvas id="pdfCanvas"></canvas>

<div class="controls">
<button onclick="prevPage()">⬅ Previous</button>
<button onclick="nextPage()">Next ➡</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const url = "Groundnut oil .pdf";   // Change only if your PDF name is different

let pdfDoc = null;
let pageNum = 1;

const canvas = document.getElementById("pdfCanvas");
const ctx = canvas.getContext("2d");

pdfjsLib.getDocument(url).promise.then(function(pdf){

    pdfDoc = pdf;
    renderPage(pageNum);

}).catch(function(){

    document.getElementById("pageInfo").innerHTML =
    "PDF not found. Check the filename.";

});

function renderPage(num){

    pdfDoc.getPage(num).then(function(page){

        const viewport = page.getViewport({scale:1.3});

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        page.render({
            canvasContext:ctx,
            viewport:viewport
        });

        document.getElementById("pageInfo").innerHTML =
        "Page " + num + " of " + pdfDoc.numPages;

    });

}

function nextPage(){

    if(pageNum < pdfDoc.numPages){
        pageNum++;
        renderPage(pageNum);
    }

}

function prevPage(){

    if(pageNum > 1){
        pageNum--;
        renderPage(pageNum);
    }

}

</script>

</body>
</html>
